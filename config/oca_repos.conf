# =============================================================================
#  OCA Repos Configuration — MBA Consultings
# =============================================================================
#
#  Este archivo define qué repositorios OCA se clonan según la versión de Odoo.
#  El script install.sh lee este archivo automáticamente al seleccionar la versión.
#
#  FORMATO:
#    [VERSION_XX]
#    https://github.com/OCA/repo-name.git
#    [/VERSION_XX]
#
#  NOTAS:
#  - Las URLs deben ser del formato https://github.com/OCA/<repo>.git
#  - El script usará --branch <VERSION>.0 al clonar (e.g. 18.0, 19.0)
#  - Para añadir una nueva versión, copiar el bloque más cercano y ajustar.
#  - Basado en: docs/install_considerations_odoo18.md
# =============================================================================


# ---------------------------------------------------------------------------
# Odoo 18 — Rama OCA 18.0 (Estable — Producción activa MBA Consultings)
# Fuente de verdad: docs/install_considerations_odoo18.md
# ---------------------------------------------------------------------------
[VERSION_18]

# Núcleo contable y financiero
https://github.com/OCA/account-financial-reporting.git
https://github.com/OCA/account-financial-tools.git
https://github.com/OCA/account-reconcile.git

# Motor de reportes y exportación Excel
https://github.com/OCA/reporting-engine.git

# Framework web y herramientas de servidor
https://github.com/OCA/web.git
https://github.com/OCA/server-tools.git
https://github.com/OCA/server-ux.git
https://github.com/OCA/server-brand.git

# MIS Builder — informes financieros dinámicos (P&L, Balance General)
https://github.com/OCA/mis-builder.git

# Suscripciones y contratos (equivalente a sale_subscription Enterprise)
https://github.com/OCA/contract.git

# Helpdesk / Mesa de soporte (equivalente a helpdesk Enterprise)
https://github.com/OCA/helpdesk.git

# DMS — Gestión documental (equivalente a documents Enterprise)
https://github.com/OCA/dms.git

# Firma electrónica (equivalente a sign Enterprise)
https://github.com/OCA/sign.git

# Inventario y código de barras (equivalente a stock_barcode Enterprise)
https://github.com/OCA/stock-logistics-barcode.git

# Manufactura y PLM / Control de calidad (equivalente a mrp_plm Enterprise)
https://github.com/OCA/manufacture.git

# Aprobaciones multi-nivel: flujos por departamento/monto
https://github.com/OCA/purchase-workflow.git
https://github.com/OCA/sale-workflow.git

[/VERSION_18]


